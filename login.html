<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JL NewReleases — Iniciar sesión</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="login.html">

  <div id="site-header"></div>

  <section class="section container" style="max-width:420px;">
    <h1 style="font-size:1.8rem;">Iniciar sesión</h1>
    <p class="muted mt-24">Accede para guardar tus favoritos y continuar donde lo dejaste.</p>

    <form id="login-form" class="panel mt-24">
      <p id="login-error" class="mt-24" style="display:none; color:var(--accent-red); font-size:0.85rem;"></p>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
    </form>

    <p class="muted center mt-24">
      ¿Prefieres novedades por WhatsApp?
      <a href="https://whatsapp.com/channel/0029Vb8YQlXATRSwmyuQTq1u" target="_blank" rel="noopener" style="color:var(--accent-gold);">Únete al canal</a>
    </p>
  </section>

  <div id="site-footer"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
