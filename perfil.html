<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JL NewReleases — Mi perfil</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="perfil.html">

  <div id="site-header"></div>

  <section class="section container" style="max-width:520px;">
    <h1 style="font-size:1.8rem;">Mi perfil</h1>

    <div class="panel mt-24">
      <div class="field">
        <label>Correo</label>
        <p id="user-email" style="font-weight:600;">—</p>
      </div>
      <div class="field">
        <label>Miembro desde</label>
        <p>2026</p>
      </div>
      <button class="btn btn-ghost mt-24" onclick="logout()">Cerrar sesión</button>
    </div>

    <p class="muted center mt-24">
      Recibe alertas de nuevos estrenos en nuestro
      <a href="https://whatsapp.com/channel/0029Vb8YQlXATRSwmyuQTq1u" target="_blank" rel="noopener" style="color:var(--accent-gold);">canal de WhatsApp</a>.
    </p>
  </section>

  <div id="site-footer"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = currentUser();
      document.getElementById("user-email").textContent = user ? user.email : "Invitado";
    });
  </script>
</body>
</html>
