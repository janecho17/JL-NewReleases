<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JL NewReleases — Inicio</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="index.html">

  <div id="site-header"></div>

  <section class="hero">
    <div class="container">
      <p class="hero-eyebrow">● Estreno de la semana</p>
      <h1>Ciudad de Cristal</h1>
      <p class="hero-desc">Un detective debe detener una conspiración antes de que la ciudad colapse. Nuevo capítulo cada semana en JL NewReleases.</p>
      <div class="hero-actions">
        <a href="video.html?id=1" class="btn btn-primary">▶ Ver ahora</a>
        <a href="explorar.html" class="btn btn-ghost">Ver catálogo completo</a>
      </div>
    </div>
  </section>

  <div class="marquee">
    <div class="marquee-track" id="marquee-track">
      <!-- se llena por JS con los títulos marcados como nuevos -->
    </div>
  </div>

  <section class="section container">
    <div class="section-head">
      <h2>Estrenos recientes</h2>
      <a href="explorar.html" class="see-all">Ver todo →</a>
    </div>
    <div class="grid" id="home-grid"></div>
  </section>

  <div id="site-footer"></div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const catalog = await loadCatalog();

      const track = document.getElementById("marquee-track");
      const news = catalog.filter((v) => v.isNew);
      const marqueeItems = [...news, ...news]
        .map((v) => `<span>★ ${v.title}</span>`)
        .join("");
      track.innerHTML = marqueeItems;

      const grid = document.getElementById("home-grid");
      grid.innerHTML = catalog.map((v) => videoCardHTML(v)).join("");
    });
  </script>
</body>
</html>
