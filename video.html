<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JL NewReleases — Reproductor</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="video.html">

  <div id="site-header"></div>

  <section class="section container">
    <div class="player-wrap" id="player">
      <span>Cargando video…</span>
    </div>

    <div class="mt-24" style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px;">
      <div>
        <h1 id="video-title" style="font-size:1.8rem;"></h1>
        <p id="video-meta" class="muted"></p>
      </div>
      <button class="btn btn-ghost" id="fav-toggle">☆ Agregar a favoritos</button>
    </div>

    <p id="video-desc" class="mt-24" style="max-width:700px;"></p>

    <div class="section">
      <div class="section-head">
        <h2>También te puede interesar</h2>
      </div>
      <div class="grid" id="recomendados"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/app.js"></script>
  <script src="js/video.js"></script>
  <script type="module" src="js/firebase.js"></script>
</body>
</html>
