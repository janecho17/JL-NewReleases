<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JL Admin</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">

</head>

<body>

<div class="admin">

    <aside class="sidebar">

        <h2>🎬 JL Admin</h2>

        <a href="#">🏠 Dashboard</a>
        <a href="#">🎥 Películas</a>
        <a href="#">👤 Usuarios</a>
        <a href="#">⭐ Favoritos</a>
        <a href="#">⚙ Configuración</a>

    </aside>

    <main class="content">

        <h1>Subir nueva película</h1>

        <form id="subir-form">

            <input id="titulo" type="text" placeholder="Título" required>

            <textarea
                id="descripcion"
                placeholder="Descripción"
                required></textarea>

            <input
                id="categoria"
                type="text"
                placeholder="Categoría">

            <input
                id="anio"
                type="number"
                placeholder="Año">

            <label>Portada</label>

            <input
                id="portada"
                type="file"
                accept="image/*">

            <label>Video</label>

            <input
                id="video"
                type="file"
                accept="video/*">

            <button type="submit">

                Publicar película

            </button>

        </form>

        <p id="estado"></p>

    </main>

</div>

<script type="module" src="../js/admin-subir.js"></script>

</body>
</html>
