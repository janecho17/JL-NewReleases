<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JL NewReleases — Admin · Subir video</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="../index.html" class="brand">JL <span>NewReleases</span></a>
      <nav class="admin-nav mt-24">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="subir.html" class="active">⬆ Subir video</a>
        <a href="editar.html">✏ Editar catálogo</a>
        <a href="estadisticas.html">📈 Estadísticas</a>
        <a href="../index.html">← Volver al sitio</a>
      </nav>
    </aside>

    <main class="admin-main">
      <h1 style="font-size:1.8rem;">Subir nuevo video</h1>

      <form id="upload-form" class="panel mt-24" style="max-width:560px;">
        <p id="upload-status" class="mt-24" style="display:none; color:var(--accent-green); font-size:0.85rem;"></p>

        <div class="field">
          <label for="title">Título</label>
          <input type="text" id="title" required />
        </div>
        <div class="field">
          <label for="category">Categoría</label>
          <input type="text" id="category" placeholder="Ej. Acción, Drama..." required />
        </div>
        <div class="field">
          <label for="year">Año</label>
          <input type="number" id="year" min="1950" max="2100" required />
        </div>
        <div class="field">
          <label for="description">Descripción</label>
          <textarea id="description" rows="3"></textarea>
        </div>
        <div class="field">
          <label>Archivo de video</label>
          <div class="upload-drop">Arrastra el archivo aquí o haz clic para elegirlo</div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;">Guardar en catálogo</button>
      </form>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
  <script type="module" src="js/firebase.js"></script>
</body>
</html>
